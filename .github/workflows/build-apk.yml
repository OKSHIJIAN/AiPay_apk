name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk AiPay.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AiPay-apk
          path: AiPay.apk

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AiPay 最新构建"
          tag_name: "latest"
          body: |
            🤖 自动构建的 AiPay APK

            📅 构建时间：${{ github.event.head_commit.timestamp }}
            🔧 构建来自：[${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            ---
            ### 安装说明
            1. 下载 `AiPay.apk`
            2. 在 Android 手机上安装（需开启「允许安装未知来源应用」）
            3. 打开 APP → 设置 → 输入 API Key → 开启监听
          files: AiPay.apk
          make_latest: true
          prerelease: false
